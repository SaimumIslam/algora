<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#e3e6ef">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/><stop offset="0.52" stop-color="#7c3aed"/><stop offset="1" stop-color="#c026d3"/>
    </linearGradient></defs>
    <rect x="450" y="250" width="300" height="300" rx="70" fill="url(#g)"/>
    <g stroke="rgba(255,255,255,.35)" stroke-width="21" stroke-linecap="round">
      <line x1="600" y1="345" x2="528" y2="490"/><line x1="600" y1="345" x2="672" y2="490"/><line x1="555" y1="435" x2="645" y2="435"/>
    </g>
    <circle cx="600" cy="345" r="36" fill="#fff"/><circle cx="528" cy="490" r="30" fill="#fff"/><circle cx="672" cy="490" r="30" fill="#fff"/>
    <circle cx="600" cy="345" r="14" fill="#5b21b6"/>
  </svg>
</template>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans',sans-serif}
</style>
</helmet>
<div style="min-height:100vh;background:radial-gradient(circle at 50% 0%,#eef0f5,#dee1ea 80%);display:flex;flex-direction:column;align-items:center;padding:48px 24px 60px;gap:44px">

  <div style="text-align:center">
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:#1a1d29">Algora — App Icon</div>
    <div style="font-size:14px;color:#6b7280;margin-top:4px">Connected-nodes glyph · algorithms meet AI</div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:18px">
    {{ heroIcon }}
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-.01em;color:#1a1d29">Algora</div>
  </div>

  <div style="display:flex;align-items:flex-end;gap:30px;flex-wrap:wrap;justify-content:center">
    <sc-for list="{{ sizes }}" as="s" hint-placeholder-count="4">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        {{ s.el }}
        <div style="font-size:12px;color:#6b7280;font-family:'IBM Plex Sans'">{{ s.label }}</div>
      </div>
    </sc-for>
  </div>

  <div style="display:flex;gap:26px;flex-wrap:wrap;justify-content:center;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      {{ monoDark }}
      <div style="font-size:12px;color:#6b7280">Monochrome</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      {{ homescreen }}
      <div style="font-size:12px;color:#6b7280">On home screen</div>
    </div>
  </div>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:720,&quot;height&quot;:720}}">
class Component extends DCLogic {
  // The Algora mark: three nodes (a small "network") whose two lower edges
  // and apex node read as an "A". Drawn as an SVG so it stays crisp at any size.
  glyph(px, opts){
    opts = opts || {};
    const stroke = opts.stroke || 'rgba(255,255,255,.30)';
    const node = opts.node || '#ffffff';
    const glow = opts.glow || 'rgba(255,255,255,.9)';
    // coordinates in a 100x100 box
    const svg = `
<svg viewBox="0 0 100 100" width="${px}" height="${px}" fill="none">
  <line x1="50" y1="26" x2="26" y2="74" stroke="${stroke}" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="26" x2="74" y2="74" stroke="${stroke}" stroke-width="7" stroke-linecap="round"/>
  <line x1="35" y1="56" x2="65" y2="56" stroke="${stroke}" stroke-width="7" stroke-linecap="round"/>
  <circle cx="50" cy="26" r="12" fill="${node}"/>
  <circle cx="26" cy="74" r="10" fill="${node}"/>
  <circle cx="74" cy="74" r="10" fill="${node}"/>
  <circle cx="50" cy="26" r="4.5" fill="${opts.dot||'#5b21b6'}"/>
</svg>`;
    return React.createElement('span',{style:{display:'inline-flex'},dangerouslySetInnerHTML:{__html:svg}});
  }
  tile(size, radiusRatio, opts){
    opts = opts || {};
    const r = Math.round(size*radiusRatio);
    const bg = opts.bg || 'linear-gradient(140deg,#6366f1 0%,#7c3aed 52%,#c026d3 100%)';
    return React.createElement('div',{
      style:{ width:size,height:size,borderRadius:r,background:bg,
        display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden',
        boxShadow: opts.flat?'none':'0 18px 40px -14px rgba(76,29,149,.55), inset 0 1px 0 rgba(255,255,255,.25)' }
    },
      React.createElement('div',{style:{position:'absolute',inset:0,background:'radial-gradient(circle at 30% 18%,rgba(255,255,255,.28),transparent 55%)'}}),
      this.glyph(Math.round(size*0.62), opts.glyph)
    );
  }
  renderVals(){
    const heroIcon = this.tile(168, 0.235);
    const sizes = [
      {label:'1024', px:96},
      {label:'180', px:72},
      {label:'120', px:56},
      {label:'60', px:40},
      {label:'40', px:30}
    ].map(s=>({ label:s.label+' px', el:this.tile(s.px, 0.235) }));

    const monoDark = this.tile(96, 0.235, {
      bg:'#0f1523', flat:false,
      glyph:{ stroke:'rgba(255,255,255,.22)', node:'#ffffff', dot:'#6366f1' }
    });

    // small home-screen mock
    const homescreen = React.createElement('div',{
      style:{ width:150,height:150,borderRadius:26,background:'linear-gradient(160deg,#1a1d29,#2b2f42)',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,
        boxShadow:'0 14px 34px -14px rgba(0,0,0,.5)' }
    },
      this.tile(66,0.235),
      React.createElement('div',{style:{color:'#fff',fontSize:12,fontWeight:500,fontFamily:'IBM Plex Sans'}},'Algora')
    );

    return { heroIcon, sizes, monoDark, homescreen };
  }
}
</script>
</body>
</html>
